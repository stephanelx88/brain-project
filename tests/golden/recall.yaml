# Golden set for WS1 benchmark — v1 expansion (2026-04-23 round-2).
#
# Each entry is consumed by `brain.benchmark.load_golden_yaml` into a
# GoldenQuery. Three shapes:
#
#   POSITIVE: query + expected (list of identifiers; any match = hit)
#     - identifier format: `fact:<type>/<slug>`  or  `note:<path>`
#     - matches `brain.benchmark.hit_identifier` output
#
#   WEAK-MATCH anchor: query + expected_weak_match: true
#     - the retrieval layer MUST classify this query as weak
#       (top RRF below threshold, or semantic-fallback threshold)
#     - pure anchors: no subject OR subject exists but no fact matches
#
#   ADVERSARIAL (subject-mismatch): query + expected_weak_match: true
#     - query subject IS defined (proper noun or possessive) but the
#       vault has no fact about that subject on that topic; filter MUST
#       drop the confidently-wrong hit that today surfaces instead.
#     - this is the "thuha dang o dau" / "đôi dép tôi đâu" regression class.
#
# Distribution target (PM 2026-04-23 18:43):
#   40 positive (people 6 / projects 12 / decisions 6 / insights 10 /
#                issues 5 / cross-lingual 1)
#   15 weak-match anchors (3 PM-verbatim preserved + 12 new)
#   5 adversarial subject-mismatch
#
# 4 queries marked `# PM-VERBATIM` are from the live test on
# 2026-04-23 14:30 and must not be edited without PM sign-off.

# ============================================================
# POSITIVE (40)
# ============================================================

