# ============================================================
# ADVERSARIAL SUBJECT-MISMATCH (5)
# ============================================================
#
# Each query has a PARSEABLE subject (proper noun or owner-voice
# possessive), but the vault has no fact for (that subject, that
# topic). Today's bug class: brain confidently returns a fact about
# a DIFFERENT subject that happens to mention the query subject.
# WS7a subject-reject must drop those; weak_match then fires.

- query: "thuha đang ở đâu"
  expected_weak_match: true
  description: "ADVERSARIAL — thuha.md deleted 2026-04-23; must NOT return stale Cần Thơ fact (live incident)"
- query: "where is thuha"
  expected_weak_match: true
  description: "ADVERSARIAL — EN twin of the thuha incident"
- query: "trinh đang ở đâu"
  expected_weak_match: true
  description: "ADVERSARIAL — no trinh entity in vault; must not return proxies"
- query: "where is Trinh"
  expected_weak_match: true
  description: "ADVERSARIAL — EN twin; WS7a subject-reject territory"
- query: "what did I eat yesterday"
  expected_weak_match: true
  description: "ADVERSARIAL — owner possessive; no meal facts; must not return another subject's food fact"
