# Brain auto-clean default rules
# Copied to <vault>/auto_clean.yaml on `brain init` (only if not already present).
# Edit your vault copy to customize — this file is the factory default.
#
# Rules are applied automatically before `brain audit` shows items for review.
# Items matching a rule are silently deleted — no user prompt needed.
#
# Each rule:
#   name:          short identifier
#   description:   why this type is safe to auto-delete
#   match:
#     types:           list of entity types  (e.g. [insights])
#     source_count:    exact integer match   (1 = single-source only)
#     name_patterns:   list of regex — entity name must match ANY one
#     frontmatter:     dict of {field: regex} — ALL must match
#     min_age_days:    (optional) only fire if entity is at least N days old
#   action: delete

rules:
  - name: milestone_announcements
    description: "'X pipeline complete / is operational / shipped' — historical milestone with no future recall value"
    match:
      types: [insights, projects, decisions]
      source_count: 1
      name_patterns:
        - "(?i)\\s+complete$"
        - "(?i)\\bcompleted\\b"
        - "(?i)\\bis\\s+operational\\b"
        - "(?i)\\bnow\\s+operational\\b"
        - "(?i)pipeline\\s+complete"
        - "(?i)\\bshipped$"
        - "(?i)\\bloop\\s+shipped\\b"
        - "(?i)implementation\\s+complete"
        - "(?i)\\bwave\\s+\\d+\\s+implementation"
      min_age_days: 0
    action: delete

  - name: changelog_entries
    description: "'N issues fixed / N tests passing / N files modified' — belongs in git history, not brain"
    match:
      types: [insights, projects, decisions]
      source_count: 1
      name_patterns:
        - "(?i)\\d+\\s+issues?\\s+(found\\s+and\\s+)?fixed"
        - "(?i)retrospective.*findings"
        - "(?i)code\\s+review.*\\d+"
        - "(?i)\\d+\\s+bugs?\\s+fixed"
        - "(?i)\\d+\\s+tests?\\s+passing"
        - "(?i)spans\\s+\\d+\\s+(new\\s+)?files?"
        - "(?i)\\d+\\s+(new|modified)\\s+files?"
      min_age_days: 0
    action: delete

  - name: stale_metric_estimates
    description: "Single-benchmark percentage/token estimates tied to a specific run — stale after one update cycle"
    match:
      types: [insights]
      source_count: 1
      name_patterns:
        - "(?i)[~≈]?\\d+\\s*[xX×]\\s*(token|reduction|faster|improvement)"
        - "(?i)[~≈]?\\d+\\s*%\\s*(token|reduction|faster|improvement)"
        - "(?i)(token|percent)\\s*(reduction|improvement)"
      min_age_days: 3
    action: delete

  - name: vague_goal_statements
    description: "Thin 'we should do X faster' goal notes without a concrete open action item"
    match:
      types: [insights]
      source_count: 1
      name_patterns:
        - "(?i)feedback\\s+loop.*accelerat"
        - "(?i)accelerat.*feedback\\s+loop"
      min_age_days: 3
    action: delete

  - name: architecture_clarifications
    description: "'X is Y, not Z' / 'renamed field' / 'clarification' — code-derivable facts, no future recall value"
    match:
      types: [insights]
      source_count: 1
      name_patterns:
        - "(?i)\\bclarification\\b"
        - "(?i)\\barchitecture\\s+is\\b"
        - "(?i)\\brenamed?\\b"
      min_age_days: 3
    action: delete

  - name: fixed_bug_postmortems
    description: "'X was blocking/broken/preventing Y' — bug postmortem; if fix shipped, lives in commit log"
    match:
      types: [insights]
      source_count: 1
      name_patterns:
        - "(?i)\\bwas\\s+blocking\\b"
        - "(?i)\\bwas\\s+broken\\b"
        - "(?i)\\bwas\\s+preventing\\b"
        - "(?i)\\bwas\\s+failing\\b"
      min_age_days: 3
    action: delete

  - name: external_knowledge_algorithms
    description: "Generic CS/algorithm explainers — training-data territory, brain adds zero value"
    match:
      types: [insights]
      source_count: 1
      name_patterns:
        - "(?i)\\balgorithm$"
        - "(?i)full.?text\\s+search"
        - "(?i)\\bdata\\s+structure$"
      min_age_days: 0
    action: delete

  - name: shipped_projects
    description: "Project/decision with completion_status: done in frontmatter — feature shipped, living in git history"
    match:
      types: [projects, decisions, insights]
      source_count: 1
      frontmatter:
        completion_status: "(?i)done|shipped|complete"
      min_age_days: 0
    action: delete

  - name: resolved_issues
    description: "Issues with `resolved: true` in frontmatter — already handled, no open action"
    match:
      types: [issues]
      source_count: 1
      frontmatter:
        resolved: "(?i)true|yes|1"
      min_age_days: 0
    action: delete

  - name: terminal_status_decisions
    description: "Decision with status: implemented/reverted/deprecated/superseded — work done or abandoned, lives in git/code"
    match:
      types: [decisions, projects, insights]
      source_count: 1
      frontmatter:
        status: "(?i)^(implemented|reverted|deprecated|superseded|abandoned|obsolete)$"
      min_age_days: 0
    action: delete

  - name: implemented_code_changes
    description: "Decisions describing a specific code change that was implemented — lives in git, not brain"
    match:
      types: [decisions]
      source_count: 1
      name_patterns:
        - "(?i)\\bfix\\b.*(crash|bug|error|init)"
        - "(?i)make\\s+\\w+\\s+(environment\\s+variable|dynamic|configurable)"
        - "(?i)\\bdelete\\b.*(script|file|legacy)"
        - "(?i)\\badd\\s+(validation|batch\\s+job|test)"
      min_age_days: 0
    action: delete

  - name: audit_session_logs
    description: "Audit review session summaries (e.g. 'Brain audit review session 2026-04-21') — ephemeral logs, not design decisions"
    match:
      types: [decisions, insights]
      source_count: 1
      name_patterns:
        - "(?i)audit\\s+review\\s+session\\s+\\d{4}"
        - "(?i)\\breview\\s+session\\s+\\d{4}-\\d{2}-\\d{2}"
      min_age_days: 0
    action: delete

  - name: event_log_decisions
    description: "Decisions whose name describes an event, not a principle — 'vault reset', 'X migration performed', 'Y deleted'"
    match:
      types: [decisions]
      source_count: 1
      name_patterns:
        - "(?i)\\b(system|vault)\\s+reset\\b"
        - "(?i)\\bmigration\\s+(performed|completed|done)\\b"
        - "(?i)\\b(deleted|removed|purged)\\b.*\\b(vault|cache|index)\\b"
      min_age_days: 0
    action: delete

  - name: phase_cycle_trackers
    description: "'W1a-W1d cycles / Phase N complete' project snapshots — changelog belongs in git"
    match:
      types: [insights, projects, decisions]
      source_count: 1
      name_patterns:
        - "(?i)optimization\\s+cycles?"
        - "(?i)W\\d+[a-z]?[-–]W\\d+[a-z]?"
        - "(?i)phase\\s+\\d+.*(done|shipped|complete)"
        - "(?i)cycle\\s+[a-d]\\s+(done|shipped|complete)"
      min_age_days: 0
    action: delete

  - name: mcp_config_snapshots
    description: "'MCP configuration across clients' — config files are the source of truth, snapshot decays"
    match:
      types: [insights]
      source_count: 1
      name_patterns:
        - "(?i)mcp\\s+configuration\\s+across"
        - "(?i)config(uration)?\\s+across\\s+.*(client|tool)"
      min_age_days: 0
    action: delete
