# Held-out golden set — NEVER used for flag-default tuning.
#
# Separation mandated by docs/autoresearch-assessment.md:
#   - `recall.yaml` is the **development** bench — features may be
#     tuned against it, so its p@1 is an optimistically-biased signal.
#   - `held-out.yaml` is the **validation** bench — only ever run at
#     merge time to confirm a tuned feature did not overfit the dev
#     set. No commit should reference this file by name in tuning
#     decisions; treat it the way ML practitioners treat the test
#     split (look once, don't look again).
#
# Composition (20 queries): 15 positive + 5 weak-match.
# Queries are disjoint from `recall.yaml` by phrasing but cover the
# same entities, so a genuinely-improved retrieval stack will lift
# both metrics together. A stack that improves recall.yaml while
# held-out stays flat = overfit flag, do not ship.

