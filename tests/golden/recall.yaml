# Golden set for WS1 benchmark — seed v0 (2026-04-23).
#
# Each entry is consumed by `brain.benchmark.load_golden_yaml` into a
# GoldenQuery. Two shapes:
#
#   POSITIVE: query + expected (list of identifiers; any match = hit)
#     - identifier format: `fact:<type>/<slug>`  or  `note:<path>`
#     - matches `brain.benchmark.hit_identifier` output
#
#   NEGATIVE / weak-match anchor: query + expected_weak_match: true
#     - the retrieval layer MUST classify this query as weak
#       (top RRF below threshold, or semantic-fallback threshold)
#     - catches the dép-2026-04-21 class: subject-mismatch queries
#       that today return confident-but-wrong hits
#
# Distribution target (PM 2026-04-23 13:30):
#   people 25% / projects 30% / decisions 15% / cross-lingual 10% +
#   weak-match anchors for the residual.
#
# 4 queries marked `# PM-VERBATIM` are from the live test on
# 2026-04-23 14:30 and must not be edited without PM sign-off.

